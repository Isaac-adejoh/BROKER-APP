<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Panel - Northfield Investment Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            color: #1a2a1f;
        }

        /* Header */
        .header {
            background: #1a3a2a;
            padding: 15px 40px;
            border-bottom: 3px solid #2ecc71;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1400px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 30px;
            height: 30px;
        }

        .logo-text .northfield {
            font-size: 22px;
            font-weight: 800;
            color: #2ecc71;
            line-height: 1;
        }

        .logo-text .investment {
            font-size: 10px;
            color: #a8d5ba;
            letter-spacing: 2px;
        }

        .admin-badge {
            background: rgba(46, 204, 113, 0.2);
            padding: 8px 20px;
            border-radius: 40px;
            color: #2ecc71;
            font-weight: bold;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #e74c3c;
            color: white;
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 0;
            padding: 30px 40px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-left: 4px solid #2ecc71;
        }

        .stat-label {
            font-size: 13px;
            color: #7a9a75;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #1a3a2a;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 2px solid #e0d8cc;
            padding-bottom: 10px;
        }

        .tab {
            background: transparent;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: #4a6a45;
            font-weight: 500;
        }

        .tab.active {
            background: #1a3a2a;
            color: #2ecc71;
        }

        .tab:hover:not(.active) {
            background: #e8e0d4;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .card h3 {
            color: #1a3a2a;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2ecc71;
            display: inline-block;
        }

        /* Table Styles - Clean Columns */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 15px 12px;
            text-align: left;
            border-bottom: 1px solid #e0d8cc;
            vertical-align: top;
        }

        th {
            background: #f0ebe3;
            color: #1a3a2a;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f9f6f0;
        }

        /* Device IP Tags */
        .device-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .device-tag {
            background: #e8f5e9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #1a3a2a;
            font-family: monospace;
        }

        .device-tag-limit {
            background: #fff3e0;
            color: #e67e22;
        }

        .ip-limit-warning {
            font-size: 11px;
            color: #e67e22;
            margin-top: 5px;
        }

        .ip-blocked {
            background: #fdeaea;
            color: #e74c3c;
        }

        /* Status Badges */
        .status-active {
            background: #e8f5e9;
            color: #2ecc71;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }

        .status-disabled {
            background: #fdeaea;
            color: #e74c3c;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }

        /* Buttons */
        .btn-sm {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            margin: 2px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #2ecc71;
            color: white;
        }

        .btn-primary:hover {
            background: #27ae60;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        .btn-outline:hover {
            background: #2ecc71;
            color: white;
        }

        /* User Action Row */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        /* Forms */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #f9f6f0;
            border: 1px solid #e0d8cc;
            border-radius: 8px;
            color: #1a3a2a;
        }

        /* Stock Cards */
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .stock-card {
            background: #f9f6f0;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #e8e0d4;
        }

        .stock-card h4 {
            color: #1a3a2a;
            margin-bottom: 10px;
        }

        .stock-price {
            font-size: 24px;
            font-weight: bold;
            color: #2ecc71;
            margin: 10px 0;
        }

        /* Withdrawal Card */
        .withdrawal-card {
            background: #f9f6f0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #f39c12;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            .main-content {
                padding: 20px;
            }
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn-sm {
                width: 100%;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="app" style="min-height: 100vh; display: flex; flex-direction: column;">Loading...</div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        let currentAdmin = null;
        let users = [];
        let stocks = [];
        let withdrawals = [];
        let paymentSettings = { crypto: {}, bank: {} };
        let currentTab = 'users';

        // Track active sessions per user (stored in localStorage as simulation)
        // In production, this should be stored in database
        let userSessions = JSON.parse(localStorage.getItem('admin_userSessions')) || {};

        async function apiCall(endpoint, options = {}) {
            const res = await fetch(endpoint, {
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                ...options
            });
            return res.json();
        }

        async function loadData() {
            try {
                const admin = await apiCall('/api/me');
                if (admin.error || admin.role !== 'admin') {
                    localStorage.removeItem('token');
                    window.location.href = '/login.html';
                    return;
                }
                currentAdmin = admin;
                users = await apiCall('/api/admin/users');
                stocks = await apiCall('/api/stocks');
                withdrawals = await apiCall('/api/admin/withdrawals');
                paymentSettings = await apiCall('/api/admin/payment-settings');
                render();
            } catch (err) {
                console.log(err);
            }
        }

        // Function to get user's logged-in devices
        function getUserDevices(userId) {
            return userSessions[userId] || [];
        }

        // Function to check if user can add new device
        function canAddDevice(userId) {
            const devices = getUserDevices(userId);
            return devices.length < 2;
        }

        // Function to add device (called during login)
        function addUserDevice(userId, ipAddress, deviceInfo) {
            if (!userSessions[userId]) {
                userSessions[userId] = [];
            }
            
            // Check if device already exists
            const existing = userSessions[userId].find(d => d.ip === ipAddress);
            if (existing) {
                existing.lastActive = new Date().toISOString();
                localStorage.setItem('admin_userSessions', JSON.stringify(userSessions));
                return true;
            }
            
            // Check limit
            if (userSessions[userId].length >= 2) {
                return false;
            }
            
            userSessions[userId].push({
                ip: ipAddress,
                deviceInfo: deviceInfo || 'Unknown Device',
                loggedInAt: new Date().toISOString(),
                lastActive: new Date().toISOString()
            });
            
            localStorage.setItem('admin_userSessions', JSON.stringify(userSessions));
            return true;
        }

        // Function to remove device (logout from specific device)
        function removeUserDevice(userId, ipAddress) {
            if (userSessions[userId]) {
                userSessions[userId] = userSessions[userId].filter(d => d.ip !== ipAddress);
                localStorage.setItem('admin_userSessions', JSON.stringify(userSessions));
                render();
            }
        }

        // Function to clear all devices for a user (admin action)
        function clearUserDevices(userId) {
            userSessions[userId] = [];
            localStorage.setItem('admin_userSessions', JSON.stringify(userSessions));
            alert('All devices cleared for this user');
            render();
        }

        // Admin Actions
        async function createUser() {
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const email = document.getElementById('newEmail').value;
            const balance = parseFloat(document.getElementById('newBalance').value) || 50000;
            
            if (!username || !password || !email) {
                alert('Fill all fields');
                return;
            }
            
            const result = await apiCall('/api/admin/create-user', {
                method: 'POST',
                body: JSON.stringify({ username, password, email, initialBalance: balance })
            });
            
            if (result.success) {
                alert(`User ${username} created!`);
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('newEmail').value = '';
                loadData();
            } else {
                alert(result.error);
            }
        }

        async function updateBalance(userId) {
            const newBalance = parseFloat(document.getElementById(`bal_${userId}`).value);
            if (isNaN(newBalance)) return;
            await apiCall('/api/admin/update-balance', {
                method: 'POST',
                body: JSON.stringify({ userId, newBalance })
            });
            alert('Balance updated');
            loadData();
        }

        async function addFunds(userId) {
            const amount = parseFloat(document.getElementById(`add_${userId}`).value);
            if (isNaN(amount)) return;
            await apiCall('/api/admin/add-funds', {
                method: 'POST',
                body: JSON.stringify({ userId, amount })
            });
            alert(`Added $${amount}`);
            loadData();
        }

        async function disableUser(userId, currentStatus) {
            await apiCall('/api/admin/disable-user', {
                method: 'POST',
                body: JSON.stringify({ userId, isActive: !currentStatus })
            });
            alert('User status updated');
            loadData();
        }

        async function resetUserPassword(userId) {
            const newPassword = prompt('Enter new password for user:', 'password123');
            if (!newPassword) return;
            await apiCall('/api/admin/change-password', {
                method: 'POST',
                body: JSON.stringify({ userId, newPassword })
            });
            alert('Password changed');
        }

        async function giveProfitToAll() {
            const percent = parseFloat(prompt('Enter profit percentage for all users:', '10'));
            if (isNaN(percent)) return;
            await apiCall('/api/admin/give-profit', {
                method: 'POST',
                body: JSON.stringify({ percentage: percent })
            });
            alert(`Gave ${percent}% profit to all users`);
            loadData();
        }

        async function updateStockPrice(stockId) {
            const newPrice = parseFloat(document.getElementById(`price_${stockId}`).value);
            if (isNaN(newPrice)) return;
            await apiCall('/api/admin/update-stock', {
                method: 'POST',
                body: JSON.stringify({ stockId, newPrice })
            });
            alert('Stock price updated');
            loadData();
        }

        async function skyrocketStock(stockId) {
            await apiCall('/api/admin/skyrocket', {
                method: 'POST',
                body: JSON.stringify({ stockId })
            });
            alert('🚀 Stock skyrocketed!');
            loadData();
        }

        async function approveWithdrawal(withdrawalId) {
            if (!confirm('Approve this withdrawal?')) return;
            await apiCall('/api/admin/approve-withdrawal', {
                method: 'POST',
                body: JSON.stringify({ withdrawalId })
            });
            alert('Withdrawal approved');
            loadData();
        }

        async function rejectWithdrawal(withdrawalId) {
            const reason = prompt('Reason for rejection:');
            await apiCall('/api/admin/reject-withdrawal', {
                method: 'POST',
                body: JSON.stringify({ withdrawalId, reason })
            });
            alert('Withdrawal rejected');
            loadData();
        }

        async function updateCryptoWallets() {
            const btc = document.getElementById('crypto_btc').value;
            const usdt_trc20 = document.getElementById('crypto_usdt_trc20').value;
            const usdt_erc20 = document.getElementById('crypto_usdt_erc20').value;
            
            await apiCall('/api/admin/update-crypto-wallets', {
                method: 'POST',
                body: JSON.stringify({ btc, usdt_trc20, usdt_erc20 })
            });
            alert('Crypto wallets updated');
            loadData();
        }

        async function updateBankInfo() {
            const bankName = document.getElementById('bank_name').value;
            const accountName = document.getElementById('bank_account_name').value;
            const accountNumber = document.getElementById('bank_account_number').value;
            const routingNumber = document.getElementById('bank_routing').value;
            const swiftCode = document.getElementById('bank_swift').value;
            const wireInstructions = document.getElementById('bank_instructions').value;
            
            await apiCall('/api/admin/update-bank-info', {
                method: 'POST',
                body: JSON.stringify({ bankName, accountName, accountNumber, routingNumber, swiftCode, wireInstructions })
            });
            alert('Bank info updated');
            loadData();
        }

        async function changeAdminUsername() {
            const newUsername = prompt('Enter new admin username:', currentAdmin.username);
            if (!newUsername || newUsername === currentAdmin.username) return;
            
            const result = await apiCall('/api/admin/change-username', {
                method: 'POST',
                body: JSON.stringify({ newUsername })
            });
            
            if (result.success) {
                alert(`Username changed to ${result.newUsername}. Please login again.`);
                localStorage.removeItem('token');
                window.location.href = '/login.html';
            } else {
                alert(result.error);
            }
        }

        async function changeAdminPassword() {
            const currentPassword = prompt('Enter current password:');
            if (!currentPassword) return;
            
            const newPassword = prompt('Enter new password (min 6 characters):');
            if (!newPassword || newPassword.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            const result = await apiCall('/api/admin/change-password-self', {
                method: 'POST',
                body: JSON.stringify({ currentPassword, newPassword })
            });
            
            if (result.success) {
                alert('Password changed! Please login again.');
                localStorage.removeItem('token');
                window.location.href = '/login.html';
            } else {
                alert(result.error);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tab}Tab`).classList.add('active');
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        function render() {
            // Calculate stats
            const totalUsers = users.filter(u => u.role !== 'admin').length;
            const activeUsers = users.filter(u => u.role !== 'admin' && u.isActive).length;
            const totalBalance = users.filter(u => u.role !== 'admin').reduce((sum, u) => sum + (u.balance || 0), 0);
            const pendingWithdrawals = withdrawals.filter(w => w.status === 'pending').length;
            const devicesCount = Object.values(userSessions).reduce((sum, devices) => sum + devices.length, 0);

            // Users Table with IP columns
            let usersHtml = '';
            for (let user of users) {
                if (user.role !== 'admin') {
                    const devices = getUserDevices(user._id);
                    const canAddMore = devices.length < 2;
                    
                    usersHtml += `
                        <tr>
                            <td style="min-width: 120px;">
                                <strong>${user.username}</strong><br>
                                <span style="font-size: 11px; color: #7a9a75;">${user.email}</span>
                            </td>
                            <td style="min-width: 80px;">
                                <span class="${user.isActive ? 'status-active' : 'status-disabled'}">${user.isActive ? 'Active' : 'Disabled'}</span>
                            </td>
                            <td style="min-width: 100px;">
                                <strong>$${user.balance.toLocaleString()}</strong>
                                <div class="action-buttons" style="margin-top: 8px;">
                                    <input type="number" id="bal_${user._id}" placeholder="Set balance" style="width: 90px; padding: 4px; font-size: 11px;">
                                    <button class="btn-sm btn-primary" onclick="updateBalance('${user._id}')">Set</button>
                                </div>
                                <div class="action-buttons" style="margin-top: 5px;">
                                    <input type="number" id="add_${user._id}" placeholder="Add funds" style="width: 90px; padding: 4px; font-size: 11px;">
                                    <button class="btn-sm btn-warning" onclick="addFunds('${user._id}')">Add</button>
                                </div>
                            </td>
                            <td style="min-width: 180px;">
                                <div class="device-list">
                                    ${devices.map(d => `
                                        <div class="device-tag">
                                            📱 ${d.ip || 'Unknown IP'}
                                            <button class="btn-sm" style="background: #e74c3c; color: white; padding: 2px 6px; margin-left: 5px;" onclick="removeUserDevice('${user._id}', '${d.ip}')">✕</button>
                                        </div>
                                    `).join('')}
                                    ${devices.length === 0 ? '<span style="color: #aaa; font-size: 12px;">No devices logged in</span>' : ''}
                                </div>
                                <div class="ip-limit-warning">
                                    ${devices.length}/2 devices used
                                    ${!canAddMore ? '<span style="color: #e74c3c;"> ⚠️ Limit reached</span>' : ''}
                                </div>
                                <button class="btn-sm btn-outline" style="margin-top: 8px;" onclick="clearUserDevices('${user._id}')">Clear All Devices</button>
                            </td>
                            <td style="min-width: 140px;">
                                <div class="action-buttons">
                                    <button class="btn-sm btn-primary" onclick="resetUserPassword('${user._id}')">Reset PW</button>
                                    <button class="btn-sm ${user.isActive ? 'btn-danger' : 'btn-primary'}" onclick="disableUser('${user._id}', ${user.isActive})">${user.isActive ? 'Disable' : 'Enable'}</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            }

            // Withdrawals Table
            let withdrawalsHtml = '';
            for (let w of withdrawals) {
                if (w.status === 'pending') {
                    withdrawalsHtml += `
                        <div class="withdrawal-card">
                            <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                                <div>
                                    <strong>${w.username || 'Unknown'}</strong><br>
                                    <span style="font-size: 13px;">Amount: <strong style="color: #2ecc71;">$${w.amount}</strong></span>
                                </div>
                                <div>
                                    ${w.bankName}<br>
                                    ${w.accountNumber}
                                </div>
                                <div>
                                    ${w.accountHolder}<br>
                                    ${w.ifscCode}
                                </div>
                                <div class="action-buttons">
                                    <button class="btn-sm btn-primary" onclick="approveWithdrawal(${w.id})">✅ Approve</button>
                                    <button class="btn-sm btn-danger" onclick="rejectWithdrawal(${w.id})">❌ Reject</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            // Stocks Control
            let stocksHtml = '';
            for (let stock of stocks) {
                stocksHtml += `
                    <div class="stock-card">
                        <h4>${stock.name}</h4>
                        <div class="stock-price">$${stock.price.toFixed(2)}</div>
                        <div style="font-size: 12px; margin-bottom: 10px;">Change: <span class="${stock.change >= 0 ? 'profit' : 'loss'}">${stock.change >= 0 ? '+' : ''}${stock.change}%</span></div>
                        <input type="number" id="price_${stock.id}" placeholder="New price" style="width: 100%; padding: 8px; margin-bottom: 8px;">
                        <button class="btn-sm btn-primary" onclick="updateStockPrice(${stock.id})" style="width: 100%; margin-bottom: 5px;">Set Price</button>
                        <button class="btn-sm btn-warning" onclick="skyrocketStock(${stock.id})" style="width: 100%;">🚀 Skyrocket (+25%)</button>
                    </div>
                `;
            }

            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="header-container">
                        <div class="logo-area">
                            <div class="logo">
                                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="50" cy="50" r="45" stroke="#ffffff" stroke-width="2" fill="none"/>
                                    <path d="M30 50 L45 35 L55 45 L70 30" stroke="#2ecc71" stroke-width="3" fill="none"/>
                                    <path d="M30 50 L45 65 L55 55 L70 70" stroke="#27ae60" stroke-width="3" fill="none"/>
                                    <circle cx="50" cy="50" r="5" fill="#2ecc71"/>
                                </svg>
                            </div>
                            <div class="logo-text">
                                <div class="northfield">NORTH FIELD</div>
                                <div class="investment">INVESTMENT SERVICES</div>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <span class="admin-badge">👑 ADMIN: ${currentAdmin?.username}</span>
                            <button class="logout-btn" onclick="logout()">Logout</button>
                        </div>
                    </div>
                </div>

                <div class="main-content">
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-label">👥 Total Users</div><div class="stat-value">${totalUsers}</div></div>
                        <div class="stat-card"><div class="stat-label">🟢 Active Users</div><div class="stat-value">${activeUsers}</div></div>
                        <div class="stat-card"><div class="stat-label">💰 Total Balance</div><div class="stat-value">$${totalBalance.toLocaleString()}</div></div>
                        <div class="stat-card"><div class="stat-label">📱 Active Devices</div><div class="stat-value">${devicesCount}</div></div>
                        <div class="stat-card"><div class="stat-label">🏦 Pending Withdrawals</div><div class="stat-value">${pendingWithdrawals}</div></div>
                    </div>

                    <div class="tabs">
                        <div class="tab ${currentTab === 'users' ? 'active' : ''}" onclick="setTab('users')">👥 Users & Devices</div>
                        <div class="tab ${currentTab === 'withdrawals' ? 'active' : ''}" onclick="setTab('withdrawals')">🏦 Withdrawals (${pendingWithdrawals})</div>
                        <div class="tab ${currentTab === 'stocks' ? 'active' : ''}" onclick="setTab('stocks')">📈 Stocks</div>
                        <div class="tab ${currentTab === 'payments' ? 'active' : ''}" onclick="setTab('payments')">💳 Payment Settings</div>
                        <div class="tab ${currentTab === 'profile' ? 'active' : ''}" onclick="setTab('profile')">⚙️ Profile</div>
                    </div>

                    <div id="usersTab" class="tab-content ${currentTab === 'users' ? 'active' : ''}">
                        <div class="card">
                            <h3>➕ Create New User</h3>
                            <div class="form-row">
                                <input type="text" id="newUsername" placeholder="Username">
                                <input type="password" id="newPassword" placeholder="Password">
                                <input type="email" id="newEmail" placeholder="Email">
                                <input type="number" id="newBalance" placeholder="Initial Balance" value="50000">
                                <button class="btn-primary" onclick="createUser()">Create User</button>
                            </div>
                        </div>

                        <div class="card">
                            <h3>⚡ Quick Actions</h3>
                            <button class="btn-primary" onclick="giveProfitToAll()">🎁 Give % Profit to All Users</button>
                        </div>

                        <div class="card">
                            <h3>👥 User Management</h3>
                            <div class="table-wrapper">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>User</th>
                                            <th>Status</th>
                                            <th>Balance / Actions</th>
                                            <th>Logged-in Devices (Max 2)</th>
                                            <th>Security</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${usersHtml || '<tr><td colspan="5">No users found</td></tr>'}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div id="withdrawalsTab" class="tab-content ${currentTab === 'withdrawals' ? 'active' : ''}">
                        <div class="card">
                            <h3>🏦 Withdrawal Requests</h3>
                            ${withdrawalsHtml || '<p style="color: #7a9a75;">No pending withdrawals</p>'}
                        </div>
                    </div>

                    <div id="stocksTab" class="tab-content ${currentTab === 'stocks' ? 'active' : ''}">
                        <div class="card">
                            <h3>📈 Stock Price Control</h3>
                            <div class="stocks-grid">${stocksHtml}</div>
                        </div>
                    </div>

                    <div id="paymentsTab" class="tab-content ${currentTab === 'payments' ? 'active' : ''}">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;">
                            <div class="card">
                                <h3>💎 Cryptocurrency Wallets</h3>
                                <div class="form-group"><label>BTC Address:</label><input type="text" id="crypto_btc" value="${paymentSettings.crypto.btc || ''}"></div>
                                <div class="form-group"><label>USDT (TRC20):</label><input type="text" id="crypto_usdt_trc20" value="${paymentSettings.crypto.usdt_trc20 || ''}"></div>
                                <div class="form-group"><label>USDT (ERC20):</label><input type="text" id="crypto_usdt_erc20" value="${paymentSettings.crypto.usdt_erc20 || ''}"></div>
                                <button class="btn-primary" onclick="updateCryptoWallets()">Save Crypto Wallets</button>
                            </div>
                            <div class="card">
                                <h3>🏦 Bank Wire Transfer</h3>
                                <div class="form-group"><label>Bank Name:</label><input type="text" id="bank_name" value="${paymentSettings.bank.bankName || ''}"></div>
                                <div class="form-group"><label>Account Name:</label><input type="text" id="bank_account_name" value="${paymentSettings.bank.accountName || ''}"></div>
                                <div class="form-group"><label>Account Number:</label><input type="text" id="bank_account_number" value="${paymentSettings.bank.accountNumber || ''}"></div>
                                <div class="form-group"><label>Routing Number:</label><input type="text" id="bank_routing" value="${paymentSettings.bank.routingNumber || ''}"></div>
                                <div class="form-group"><label>SWIFT Code:</label><input type="text" id="bank_swift" value="${paymentSettings.bank.swiftCode || ''}"></div>
                                <div class="form-group"><label>Instructions:</label><textarea id="bank_instructions" rows="3">${paymentSettings.bank.wireInstructions || ''}</textarea></div>
                                <button class="btn-primary" onclick="updateBankInfo()">Save Bank Info</button>
                            </div>
                        </div>
                    </div>

                    <div id="profileTab" class="tab-content ${currentTab === 'profile' ? 'active' : ''}">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                            <div class="card">
                                <h3>👤 Change Username</h3>
                                <p>Current: <strong>${currentAdmin?.username}</strong></p>
                                <button class="btn-primary" onclick="changeAdminUsername()">Change Username</button>
                            </div>
                            <div class="card">
                                <h3>🔒 Change Password</h3>
                                <button class="btn-primary" onclick="changeAdminPassword()">Change Password</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="footer">
                    <div class="footer-container">
                        <div class="footer-text">
                            <p>Investment and insurance products and services are offered through Osaic Institutions, Inc., Member FINRA/SIPC. Northfield Investment Services is a trade name of Northfield Savings Bank. Osaic Institutions and Northfield Savings Bank are not affiliated.</p>
                            <div class="footer-warning">⚠️ Investment Products: NOT FDIC insured | NO bank guarantee | MAY lose value</div>
                        </div>
                        <div class="footer-bottom">&copy; 2024 Northfield Investment Services. All rights reserved.</div>
                    </div>
                </div>
            `;
        }

        // Expose functions to window
        window.updateBalance = updateBalance;
        window.addFunds = addFunds;
        window.disableUser = disableUser;
        window.resetUserPassword = resetUserPassword;
        window.clearUserDevices = clearUserDevices;
        window.removeUserDevice = removeUserDevice;
        window.approveWithdrawal = approveWithdrawal;
        window.rejectWithdrawal = rejectWithdrawal;
        window.updateStockPrice = updateStockPrice;
        window.skyrocketStock = skyrocketStock;
        window.updateCryptoWallets = updateCryptoWallets;
        window.updateBankInfo = updateBankInfo;
        window.changeAdminUsername = changeAdminUsername;
        window.changeAdminPassword = changeAdminPassword;
        window.giveProfitToAll = giveProfitToAll;
        window.createUser = createUser;

        loadData();
    </script>
</body>
</html>
