<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - Northfield Investment Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            color: #1a2a1f;
        }

        /* Header - Dark Forest Green */
        .header {
            background: #1a3a2a;
            padding: 15px 40px;
            border-bottom: 3px solid #2ecc71;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1400px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 30px;
            height: 30px;
        }

        .logo-text .northfield {
            font-size: 22px;
            font-weight: 800;
            color: #2ecc71;
            line-height: 1;
        }

        .logo-text .investment {
            font-size: 10px;
            color: #a8d5ba;
            letter-spacing: 2px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(46, 204, 113, 0.1);
            padding: 8px 20px;
            border-radius: 40px;
        }

        .user-name {
            color: #2ecc71;
            font-weight: bold;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #e74c3c;
            color: white;
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 0;
            padding: 30px 40px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-left: 4px solid #2ecc71;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            font-size: 14px;
            color: #7a9a75;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #1a3a2a;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 2px solid #e0d8cc;
            padding-bottom: 10px;
        }

        .tab {
            background: transparent;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: #4a6a45;
            font-weight: 500;
        }

        .tab.active {
            background: #1a3a2a;
            color: #2ecc71;
        }

        .tab:hover:not(.active) {
            background: #e8e0d4;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .card h3 {
            color: #1a3a2a;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2ecc71;
            display: inline-block;
        }

        /* Stocks Grid */
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .stock-card {
            background: #f9f6f0;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #e8e0d4;
            transition: all 0.3s;
        }

        .stock-card:hover {
            transform: translateY(-3px);
            border-color: #2ecc71;
            box-shadow: 0 5px 15px rgba(46,204,113,0.1);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stock-name {
            font-size: 18px;
            font-weight: bold;
            color: #1a3a2a;
        }

        .stock-change {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(46,204,113,0.1);
            color: #2ecc71;
        }

        .stock-price {
            font-size: 24px;
            font-weight: bold;
            color: #1a3a2a;
            margin-bottom: 15px;
        }

        .stock-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .stock-actions input {
            flex: 1;
            padding: 10px;
            background: #ffffff;
            border: 1px solid #e0d8cc;
            border-radius: 8px;
            color: #1a3a2a;
        }

        .buy-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .buy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 3px 10px rgba(46,204,113,0.3);
        }

        .sell-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0d8cc;
        }

        th {
            color: #1a3a2a;
            font-weight: 600;
            background: #f0ebe3;
        }

        .profit {
            color: #2ecc71;
        }

        .loss {
            color: #e74c3c;
        }

        .pending {
            color: #f39c12;
        }

        .approved {
            color: #2ecc71;
        }

        .rejected {
            color: #e74c3c;
        }

        /* Withdrawal Form */
        .withdraw-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .withdraw-form input {
            padding: 12px;
            background: #f9f6f0;
            border: 1px solid #e0d8cc;
            border-radius: 8px;
            color: #1a3a2a;
        }

        .withdraw-form button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border-top: 4px solid #2ecc71;
        }

        .modal-content h3 {
            color: #1a3a2a;
            margin-bottom: 20px;
        }

        .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #f9f6f0;
            border: 1px solid #e0d8cc;
            border-radius: 8px;
        }

        .payment-details {
            background: #f0ebe3;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 13px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .confirm-btn {
            flex: 1;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .cancel-btn {
            flex: 1;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Footer */
        .footer {
            background: #1a3a2a;
            padding: 30px 40px 20px;
            border-top: 3px solid #2ecc71;
            margin-top: 40px;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0;
        }

        .footer-text {
            font-size: 11px;
            color: #a8d5ba;
            line-height: 1.6;
            text-align: justify;
        }

        .footer-warning {
            background: rgba(46,204,113,0.08);
            border-left: 3px solid #2ecc71;
            padding: 15px;
            margin: 20px 0;
            font-size: 11px;
            color: #2ecc71;
        }

        .footer-bottom {
            margin-top: 20px;
            padding-top: 15px;
            text-align: center;
            font-size: 10px;
            color: #7a9a75;
            border-top: 1px solid rgba(46,204,113,0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            .main-content {
                padding: 20px;
            }
            .stats-grid {
                gap: 15px;
            }
            .stat-value {
                font-size: 24px;
            }
            .tabs {
                gap: 8px;
            }
            .tab {
                padding: 6px 15px;
                font-size: 14px;
            }
            .card {
                padding: 20px;
            }
            .stocks-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .stocks-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div id="app" style="min-height: 100vh; display: flex; flex-direction: column;">Loading...</div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        let currentUser = null;
        let stocks = [];
        let paymentMethods = { crypto: {}, bank: {} };
        let withdrawals = [];
        let currentTab = 'dashboard';

        async function apiCall(endpoint, options = {}) {
            const res = await fetch(endpoint, {
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                ...options
            });
            return res.json();
        }

        async function loadData() {
            try {
                const user = await apiCall('/api/me');
                if (user.error) {
                    localStorage.removeItem('token');
                    window.location.href = '/login.html';
                    return;
                }
                currentUser = user;
                stocks = await apiCall('/api/stocks');
                paymentMethods = await apiCall('/api/payment-methods');
                withdrawals = await apiCall('/api/my-withdrawals');
                render();
            } catch (err) {
                console.log(err);
            }
        }

        function showPaymentModal(stock, quantity) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>Complete Purchase: ${stock.name}</h3>
                    <p>Shares: ${quantity}</p>
                    <p><strong>Total Amount: $${(stock.price * quantity).toFixed(2)}</strong></p>
                    <hr style="margin: 15px 0;">
                    <label>Select Payment Method:</label>
                    <select id="paymentMethodSelect">
                        <option value="">-- Select --</option>
                        <option value="crypto">💎 Cryptocurrency (USDT/BTC)</option>
                        <option value="bank">🏦 Wire Transfer</option>
                    </select>
                    <div id="paymentDetails" class="payment-details" style="display: none;"></div>
                    <div class="modal-buttons">
                        <button class="confirm-btn" onclick="confirmPurchaseWithPayment(${stock.id}, ${quantity})">Confirm Payment</button>
                        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const select = document.getElementById('paymentMethodSelect');
            select.addEventListener('change', function() {
                const detailsDiv = document.getElementById('paymentDetails');
                if (this.value === 'crypto') {
                    detailsDiv.style.display = 'block';
                    detailsDiv.innerHTML = `
                        <strong>💎 CRYPTOCURRENCY PAYMENT</strong><br><br>
                        <strong>BTC Address:</strong><br>${paymentMethods.crypto.btc || 'Not set'}<br><br>
                        <strong>USDT (TRC20):</strong><br>${paymentMethods.crypto.usdt_trc20 || 'Not set'}<br><br>
                        <strong>USDT (ERC20):</strong><br>${paymentMethods.crypto.usdt_erc20 || 'Not set'}<br><br>
                        <span style="color: #2ecc71;">⚠️ Send exact amount: $${(stock.price * quantity).toFixed(2)}</span><br>
                        <span style="color: #2ecc71;">⚠️ Include your username: ${currentUser.username}</span>
                    `;
                } else if (this.value === 'bank') {
                    detailsDiv.style.display = 'block';
                    detailsDiv.innerHTML = `
                        <strong>🏦 WIRE TRANSFER DETAILS</strong><br><br>
                        <strong>Bank Name:</strong> ${paymentMethods.bank.bankName || 'Not set'}<br>
                        <strong>Account Name:</strong> ${paymentMethods.bank.accountName || 'Not set'}<br>
                        <strong>Account Number:</strong> ${paymentMethods.bank.accountNumber || 'Not set'}<br>
                        <strong>Routing Number:</strong> ${paymentMethods.bank.routingNumber || 'Not set'}<br>
                        <strong>SWIFT Code:</strong> ${paymentMethods.bank.swiftCode || 'Not set'}<br><br>
                        <strong>Instructions:</strong><br>${paymentMethods.bank.wireInstructions || 'No instructions'}<br><br>
                        <span style="color: #2ecc71;">⚠️ Send exact amount: $${(stock.price * quantity).toFixed(2)}</span><br>
                        <span style="color: #2ecc71;">⚠️ Include your username: ${currentUser.username}</span>
                    `;
                } else {
                    detailsDiv.style.display = 'none';
                }
            });
        }

        window.confirmPurchaseWithPayment = async function(stockId, quantity) {
            const paymentMethod = document.getElementById('paymentMethodSelect').value;
            if (!paymentMethod) {
                alert('Please select a payment method');
                return;
            }
            
            const result = await apiCall('/api/buy', {
                method: 'POST',
                body: JSON.stringify({ stockId, quantity, paymentMethod })
            });
            
            if (result.success) {
                alert(`Purchase successful! ${quantity} shares added to your portfolio.`);
                closeModal();
                loadData();
            } else {
                alert(result.error);
            }
        };

        async function buyStock(stock) {
            const quantity = prompt(`How many shares of ${stock.name} to buy?`, '1');
            if (!quantity || isNaN(quantity)) return;
            showPaymentModal(stock, parseInt(quantity));
        }

        async function sellStock(stockId, stockName, quantity) {
            if (!confirm(`Sell ${quantity} shares of ${stockName}?`)) return;
            
            const result = await apiCall('/api/sell', {
                method: 'POST',
                body: JSON.stringify({ stockId, quantity })
            });
            
            if (result.success) {
                alert(`Sold ${quantity} shares of ${stockName}`);
                loadData();
            } else {
                alert(result.error);
            }
        }

        async function submitWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const bankName = document.getElementById('bankName').value;
            const accountNumber = document.getElementById('accountNumber').value;
            const accountHolder = document.getElementById('accountHolder').value;
            const ifscCode = document.getElementById('ifscCode').value;
            
            if (!amount || amount < 10) {
                alert('Minimum withdrawal amount is $10');
                return;
            }
            if (amount > currentUser.balance) {
                alert('Insufficient balance');
                return;
            }
            if (!bankName || !accountNumber || !accountHolder || !ifscCode) {
                alert('Please fill all bank details');
                return;
            }
            
            const result = await apiCall('/api/withdraw', {
                method: 'POST',
                body: JSON.stringify({ amount, bankName, accountNumber, accountHolder, ifscCode })
            });
            
            if (result.success) {
                alert('Withdrawal request submitted! Admin will review.');
                document.getElementById('withdrawAmount').value = '';
                document.getElementById('bankName').value = '';
                document.getElementById('accountNumber').value = '';
                document.getElementById('accountHolder').value = '';
                document.getElementById('ifscCode').value = '';
                loadData();
            } else {
                alert(result.error);
            }
        }

        window.closeModal = function() {
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
        };

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }

        function setTab(tab) {
            currentTab = tab;
            render();
        }

        function render() {
            let portfolioValue = 0;
            let holdingsHtml = '';
            
            for (let holding of (currentUser.holdings || [])) {
                const stock = stocks.find(s => s.id === holding.stockId);
                if (stock) {
                    const currentValue = stock.price * holding.quantity;
                    const invested = holding.avgPrice * holding.quantity;
                    const profitLoss = currentValue - invested;
                    portfolioValue += currentValue;
                    
                    holdingsHtml += `
                        <tr>
                            <td><strong>${holding.stockName}</strong>${stock.change >= 0 ? ' ▲' : ' ▼'} </td>
                            <td>${holding.quantity}</td>
                            <td>$${holding.avgPrice.toFixed(2)}</td>
                            <td>$${stock.price.toFixed(2)}</td>
                            <td>$${currentValue.toFixed(2)}</td>
                            <td class="${profitLoss >= 0 ? 'profit' : 'loss'}">${profitLoss >= 0 ? '+' : ''}$${profitLoss.toFixed(2)}</td>
                            <td><button class="sell-btn" onclick="sellStock(${holding.stockId}, '${holding.stockName}', ${holding.quantity})">Sell</button></td>
                        </tr>
                    `;
                }
            }
            
            const netWorth = currentUser.balance + portfolioValue;
            
            let transactionsHtml = '';
            for (let tx of (currentUser.transactions || []).slice(0, 20)) {
                transactionsHtml += `<tr>
                    <td>${tx.date}</td>
                    <td>${tx.type}</td>
                    <td>${tx.stock}</td>
                    <td>${tx.shares || '-'}</td>
                    <td>$${tx.price?.toFixed(2) || '-'}</td>
                    <td>$${tx.total?.toFixed(2) || '-'}</td>
                    <td class="${tx.profitLoss && tx.profitLoss > 0 ? 'profit' : (tx.profitLoss && tx.profitLoss < 0 ? 'loss' : '')}">${tx.profitLoss ? (tx.profitLoss > 0 ? '+' : '') + tx.profitLoss.toFixed(2) : '-'}</td>
                </tr>`;
            }
            
            let withdrawalsHtml = '';
            for (let w of withdrawals) {
                withdrawalsHtml += `<tr>
                    <td>$${w.amount}</td>
                    <td>${w.bankName}</td>
                    <td>${w.accountNumber}</td>
                    <td class="${w.status === 'pending' ? 'pending' : (w.status === 'approved' ? 'approved' : 'rejected')}">${w.status.toUpperCase()}</td>
                    <td>${w.date || '-'}</td>
                </tr>`;
            }
            
            let stocksHtml = '';
            for (let stock of stocks) {
                stocksHtml += `
                    <div class="stock-card">
                        <div class="stock-header">
                            <span class="stock-name">${stock.name}</span>
                            <span class="stock-change">${stock.change >= 0 ? '+' : ''}${stock.change}%</span>
                        </div>
                        <div class="stock-price">$${stock.price.toFixed(2)}</div>
                        <div class="stock-actions">
                            <input type="number" id="qty_${stock.id}" placeholder="Shares" min="1">
                            <button class="buy-btn" onclick='buyStock({id:${stock.id}, name:"${stock.name}", price:${stock.price}})'>Buy</button>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="header-container">
                        <div class="logo-area">
                            <div class="logo">
                                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="50" cy="50" r="45" stroke="#ffffff" stroke-width="2" fill="none"/>
                                    <path d="M30 50 L45 35 L55 45 L70 30" stroke="#2ecc71" stroke-width="3" fill="none" stroke-linecap="round"/>
                                    <path d="M30 50 L45 65 L55 55 L70 70" stroke="#27ae60" stroke-width="3" fill="none" stroke-linecap="round"/>
                                    <circle cx="50" cy="50" r="5" fill="#2ecc71"/>
                                </svg>
                            </div>
                            <div class="logo-text">
                                <div class="northfield">NORTH FIELD</div>
                                <div class="investment">INVESTMENT SERVICES</div>
                            </div>
                        </div>
                        <div class="user-info">
                            <span class="user-name">👤 ${currentUser.username}</span>
                            <button class="logout-btn" onclick="logout()">Logout</button>
                        </div>
                    </div>
                </div>

                <div class="main-content">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">💰 Available Balance</div>
                            <div class="stat-value">$${currentUser.balance.toLocaleString()}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">📊 Portfolio Value</div>
                            <div class="stat-value">$${portfolioValue.toLocaleString()}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">💎 Net Worth</div>
                            <div class="stat-value">$${netWorth.toLocaleString()}</div>
                        </div>
                    </div>

                    <div class="tabs">
                        <div class="tab ${currentTab === 'dashboard' ? 'active' : ''}" onclick="setTab('dashboard')">📈 Dashboard</div>
                        <div class="tab ${currentTab === 'withdraw' ? 'active' : ''}" onclick="setTab('withdraw')">💸 Withdraw</div>
                        <div class="tab ${currentTab === 'history' ? 'active' : ''}" onclick="setTab('history')">📜 History</div>
                    </div>

                    <div id="dashboardTab" class="tab-content ${currentTab === 'dashboard' ? 'active' : ''}">
                        <div class="card">
                            <h3>📈 Available Stocks</h3>
                            <div class="stocks-grid">${stocksHtml}</div>
                        </div>
                        ${holdingsHtml ? `<div class="card"><h3>📋 Your Holdings</h3><div class="table-wrapper"><table><thead><tr><th>Stock</th><th>Shares</th><th>Avg Price</th><th>Current</th><th>Value</th><th>P&L</th><th></th></tr></thead><tbody>${holdingsHtml}</tbody></table></div></div>` : ''}
                    </div>

                    <div id="withdrawTab" class="tab-content ${currentTab === 'withdraw' ? 'active' : ''}">
                        <div class="card">
                            <h3>💸 Request Withdrawal</h3>
                            <div class="withdraw-form">
                                <input type="number" id="withdrawAmount" placeholder="Amount ($)" min="10">
                                <input type="text" id="bankName" placeholder="Bank Name">
                                <input type="text" id="accountNumber" placeholder="Account Number">
                                <input type="text" id="accountHolder" placeholder="Account Holder Name">
                                <input type="text" id="ifscCode" placeholder="IFSC / Routing Code">
                                <button onclick="submitWithdrawal()">Submit Request</button>
                            </div>
                        </div>
                        <div class="card">
                            <h3>📋 My Withdrawal Requests</h3>
                            <div class="table-wrapper">
                                <table>
                                    <thead><tr><th>Amount</th><th>Bank</th><th>Account</th><th>Status</th><th>Date</th></tr></thead>
                                    <tbody>${withdrawalsHtml || '<tr><td colspan="5">No withdrawal requests</td></tr>'}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div id="historyTab" class="tab-content ${currentTab === 'history' ? 'active' : ''}">
                        <div class="card">
                            <h3>📜 Transaction History</h3>
                            <div class="table-wrapper">
                                <table>
                                    <thead><tr><th>Date</th><th>Type</th><th>Stock</th><th>Shares</th><th>Price</th><th>Total</th><th>P&L</th></tr></thead>
                                    <tbody>${transactionsHtml || '<tr><td colspan="7">No transactions</td></tr>'}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="footer">
                    <div class="footer-container">

                </div>
            `;
        }

        loadData();
    </script>
